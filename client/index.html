    <script>
      // Inline theme-init script — applies saved theme before paint to avoid
      // flash. Default is Light Mode: a saved choice is always respected,
      // but with no saved choice this no longer falls back to the OS/browser
      // prefers-color-scheme — every first-time visitor now starts light.
      (function () {
        try {
          var s = localStorage.getItem("dmax-theme");
          var t = s || "light";
          if (t === "dark") {
            document.documentElement.classList.add("dark");
          }
          document.documentElement.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
